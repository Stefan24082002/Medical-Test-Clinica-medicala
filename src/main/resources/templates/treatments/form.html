<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Serviciu medical</title>
</head>
<body>

<h1 th:text="${pageTitle}">Serviciu medical</h1>

<p>
    <a th:href="@{/dashboard}">Dashboard</a> |
    <a th:href="@{/admin/treatments}">Înapoi la servicii medicale</a>
</p>

<form th:action="${treatment.id == null} ? @{/admin/treatments} : @{/admin/treatments/edit/{id}(id=${treatment.id})}"
      th:object="${treatment}"
      method="post">

    <div>
        <label>Nume serviciu medical:</label>
        <input type="text" th:field="*{name}" required minlength="2">
        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></div>
    </div>

    <br>

    <div>
        <label>Descriere:</label>
        <textarea th:field="*{description}" rows="4" cols="40"></textarea>
        <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" style="color:red;"></div>
    </div>

    <br>

    <div>
        <label>Preț:</label>
        <input type="number" th:field="*{price}" min="0" step="0.01" required>
        <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" style="color:red;"></div>
    </div>

    <br>

    <button type="submit">Salvează</button>
    <a th:href="@{/admin/treatments}">Anulează</a>
</form>

</body>
</html>
