<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Programare</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="page">

    <nav class="navbar">
        <div class="navbar-logo-center">
            <img th:src="@{/images/logo.png}" alt="Medical Test" class="main-logo">
        </div>

        <div class="navbar-right">
            <span class="navbar-user">Admin</span>

            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="logout-button">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">

        <section class="hero">
            <h1 th:text="${pageTitle}">Programare</h1>
            <p>Completează pacientul, doctorul, data, ora, motivul și statusul programării.</p>
            <span class="role-badge">ADMIN PANEL</span>
        </section>

        <section>
            <div class="page-actions">
                <a class="btn" th:href="@{/dashboard}">Dashboard</a>
                <a class="btn btn-outline" th:href="@{/admin/appointments}">Înapoi la programări</a>
                <a class="btn btn-outline" th:href="@{/admin/patients}">Pacienți</a>
                <a class="btn btn-outline" th:href="@{/admin/doctors}">Doctori</a>
                <a class="btn btn-outline" th:href="@{/admin/medical-records}">Fișe medicale</a>
            </div>

            <div class="form-card">

                <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}">
                    Eroare
                </div>

                <form th:action="${appointment.id == null} ? @{/admin/appointments} : @{/admin/appointments/edit/{id}(id=${appointment.id})}"
                      th:object="${appointment}"
                      method="post">

                    <div class="form-grid">

                        <div class="form-group">
                            <label>Pacient</label>
                            <select name="patientId" required>
                                <option value="">-- Alege pacient --</option>

                                <option th:each="patient : ${patients}"
                                        th:value="${patient.id}"
                                        th:text="${patient.firstName + ' ' + patient.lastName}"
                                        th:selected="${appointment.patient != null and appointment.patient.id == patient.id}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Doctor</label>
                            <select name="doctorId" required>
                                <option value="">-- Alege doctor --</option>

                                <option th:each="doctor : ${doctors}"
                                        th:value="${doctor.id}"
                                        th:text="${doctor.firstName + ' ' + doctor.lastName + ' - ' + doctor.specialization}"
                                        th:selected="${appointment.doctor != null and appointment.doctor.id == doctor.id}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Data și ora programării</label>
                            <input type="datetime-local"
                                   th:field="*{appointmentDate}"
                                   required>
                            <div th:if="${#fields.hasErrors('appointmentDate')}"
                                 th:errors="*{appointmentDate}"
                                 class="field-error">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Status</label>
                            <select th:field="*{status}" required>
                                <option th:each="status : ${statuses}"
                                        th:value="${status}"
                                        th:text="${status}">
                                </option>
                            </select>
                            <div th:if="${#fields.hasErrors('status')}"
                                 th:errors="*{status}"
                                 class="field-error">
                            </div>
                        </div>

                    </div>

                    <div class="form-group">
                        <label>Motiv programare</label>
                        <textarea th:field="*{reason}"
                                  rows="5"
                                  placeholder="Ex: consultație, control, durere etc."></textarea>
                        <div th:if="${#fields.hasErrors('reason')}"
                             th:errors="*{reason}"
                             class="field-error">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit">Salvează</button>
                        <a class="btn btn-outline" th:href="@{/admin/appointments}">Anulează</a>
                    </div>

                </form>
            </div>
        </section>

        <div class="footer-space"></div>
    </main>
</div>

</body>
</html>
