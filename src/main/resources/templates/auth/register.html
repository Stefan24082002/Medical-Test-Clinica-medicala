<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Înregistrare - Medical Test</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="auth-page">

    <div class="auth-card auth-card-wide">

        <div class="auth-logo-wrapper">
            <img th:src="@{/images/logo.png}" alt="Medical Test" class="auth-logo">
        </div>

        <h1>Înregistrare pacient</h1>
        <p class="auth-subtitle">Creează un cont pentru programări și fișe medicale</p>

        <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}">
            Eroare
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post">

            <div class="form-grid">

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" th:field="*{username}" placeholder="Ex: stefan123" required>
                    <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="field-error"></div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" placeholder="exemplu@email.com" required>
                    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></div>
                </div>

                <div class="form-group">
                    <label>Parolă</label>
                    <input type="password" th:field="*{password}" placeholder="Minim 6 caractere" required>
                    <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="field-error"></div>
                </div>

                <div class="form-group">
                    <label>Prenume</label>
                    <input type="text" name="firstName" placeholder="Prenume" required>
                </div>

                <div class="form-group">
                    <label>Nume</label>
                    <input type="text" name="lastName" placeholder="Nume" required>
                </div>

                <div class="form-group">
                    <label>Telefon</label>
                    <input type="text" name="phone" placeholder="0712345678">
                </div>

            </div>

            <button type="submit" class="auth-button">Creează cont</button>
        </form>

        <p class="auth-footer">
            Ai deja cont?
            <a href="/login">Autentifică-te</a>
        </p>

    </div>

</div>

</body>
</html>
