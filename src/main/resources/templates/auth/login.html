<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Autentificare - Medical Test</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="auth-page">

    <div class="auth-card">

        <div class="auth-logo-wrapper">
            <img th:src="@{/images/logo.png}" alt="Medical Test" class="auth-logo">
        </div>

        <h1>Autentificare</h1>
        <p class="auth-subtitle">Intră în contul tău Medical Test</p>

        <div th:if="${param.error}" class="error-message">
            Username sau parolă incorectă.
        </div>

        <div th:if="${param.logout}" class="success-message">
            Te-ai delogat cu succes.
        </div>

        <div th:if="${param.registered}" class="success-message">
            Contul a fost creat cu succes. Te poți autentifica.
        </div>

        <form th:action="@{/login}" method="post">

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Introdu username-ul" required>
            </div>

            <div class="form-group">
                <label>Parolă</label>
                <input type="password" name="password" placeholder="Introdu parola" required>
            </div>

            <button type="submit" class="auth-button">Login</button>
        </form>

        <p class="auth-footer">
            Nu ai cont?
            <a href="/register">Creează cont pacient</a>
        </p>

    </div>

</div>

</body>
</html>
