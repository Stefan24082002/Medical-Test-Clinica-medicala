<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Departament</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="page">

    <nav class="navbar">
        <div class="navbar-logo-center">
            <img th:src="@{/images/logo.png}" alt="Medical Test" class="main-logo">
        </div>

        <div class="navbar-right">
            <span class="navbar-user">Admin</span>

            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="logout-button">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">

        <section class="hero">
            <h1 th:text="${pageTitle}">Departament</h1>
            <p>Completează informațiile departamentului medical.</p>
            <span class="role-badge">ADMIN PANEL</span>
        </section>

        <section>
            <div class="page-actions">
                <a class="btn" th:href="@{/dashboard}">Dashboard</a>
                <a class="btn btn-outline" th:href="@{/admin/departments}">Înapoi la departamente</a>
                <a class="btn btn-outline" th:href="@{/admin/doctors}">Doctori</a>
                <a class="btn btn-outline" th:href="@{/admin/treatments}">Servicii medicale</a>
            </div>

            <div class="form-card">

                <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}">
                    Eroare
                </div>

                <form th:action="${department.id == null} ? @{/admin/departments} : @{/admin/departments/edit/{id}(id=${department.id})}"
                      th:object="${department}"
                      method="post">

                    <div class="form-group">
                        <label>Nume departament</label>
                        <input type="text" th:field="*{name}" placeholder="Ex: Cardiologie" required>
                        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="field-error"></div>
                    </div>

                    <div class="form-group">
                        <label>Descriere</label>
                        <textarea th:field="*{description}"
                                  rows="5"
                                  placeholder="Descriere scurtă a departamentului"></textarea>
                        <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="field-error"></div>
                    </div>

                    <div class="form-actions">
                        <button type="submit">Salvează</button>
                        <a class="btn btn-outline" th:href="@{/admin/departments}">Anulează</a>
                    </div>

                </form>
            </div>
        </section>

        <div class="footer-space"></div>
    </main>
</div>

</body>
</html>
