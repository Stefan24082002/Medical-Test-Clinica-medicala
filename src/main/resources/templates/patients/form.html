<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Pacient</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="page">

    <nav class="navbar">
        <div class="navbar-logo-center">
            <img th:src="@{/images/logo.png}" alt="Medical Test" class="main-logo">
        </div>

        <div class="navbar-right">
            <span class="navbar-user">Admin</span>

            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="logout-button">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">

        <section class="hero">
            <h1 th:text="${pageTitle}">Pacient</h1>
            <p>Completează datele pacientului și, opțional, creează cont de autentificare.</p>
            <span class="role-badge">ADMIN PANEL</span>
        </section>

        <section>
            <div class="page-actions">
                <a class="btn" th:href="@{/dashboard}">Dashboard</a>
                <a class="btn btn-outline" th:href="@{/admin/patients}">Înapoi la pacienți</a>
                <a class="btn btn-outline" th:href="@{/admin/appointments}">Programări</a>
                <a class="btn btn-outline" th:href="@{/admin/doctors}">Doctori</a>
            </div>

            <div class="form-card">

                <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}">
                    Eroare
                </div>

                <form th:action="${patient.id == null} ? @{/admin/patients} : @{/admin/patients/edit/{id}(id=${patient.id})}"
                      th:object="${patient}"
                      method="post">

                    <h2>Date pacient</h2>

                    <div class="form-grid">

                        <div class="form-group">
                            <label>Prenume</label>
                            <input type="text" th:field="*{firstName}" placeholder="Prenume pacient" required>
                            <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="field-error"></div>
                        </div>

                        <div class="form-group">
                            <label>Nume</label>
                            <input type="text" th:field="*{lastName}" placeholder="Nume pacient" required>
                            <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="field-error"></div>
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" th:field="*{email}" placeholder="pacient@email.com">
                            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></div>
                        </div>

                        <div class="form-group">
                            <label>Telefon</label>
                            <input type="text" th:field="*{phone}" placeholder="0712345678">
                            <div th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="field-error"></div>
                        </div>

                    </div>

                    <div th:if="${patient.id == null}">
                        <h2 style="margin-top: 26px;">Cont pacient</h2>

                        <p class="muted-text">
                            Completează username și parolă doar dacă vrei să creezi și cont de autentificare pentru pacient.
                        </p>

                        <div class="form-grid">

                            <div class="form-group">
                                <label>Username cont pacient</label>
                                <input type="text"
                                       name="username"
                                       placeholder="Ex: pacient.ionescu">
                            </div>

                            <div class="form-group">
                                <label>Parolă cont pacient</label>
                                <input type="password"
                                       name="password"
                                       placeholder="Parolă pentru autentificare">
                            </div>

                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit">Salvează</button>
                        <a class="btn btn-outline" th:href="@{/admin/patients}">Anulează</a>
                    </div>

                </form>
            </div>
        </section>

        <div class="footer-space"></div>
    </main>
</div>

</body>
</html>
