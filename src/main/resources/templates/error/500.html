<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eroare server - Medical Test</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="auth-page">

    <div class="auth-card">

        <div class="auth-logo-wrapper">
            <img th:src="@{/images/logo.png}" alt="Medical Test" class="auth-logo">
        </div>

        <h1>500</h1>
        <p class="auth-subtitle">
            A apărut o eroare internă. Verifică datele introduse sau încearcă din nou.
        </p>

        <div class="error-message">
            Dacă eroarea persistă, verifică consola din Eclipse pentru mesajul exact.
        </div>

        <div class="form-actions" style="justify-content: center;">
            <a class="btn" th:href="@{/dashboard}">Înapoi la dashboard</a>
            <a class="btn btn-outline" href="javascript:history.back()">Înapoi</a>
        </div>

    </div>

</div>

</body>
</html>
