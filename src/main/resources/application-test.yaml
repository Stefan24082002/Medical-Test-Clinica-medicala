spring:
  datasource:
    url: jdbc:h2:mem:clinic_test_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  h2:
    console:
      enabled: true

logging:
  level:
    root: INFO
    com.example.clinic: DEBUG
    org.hibernate.SQL: DEBUG